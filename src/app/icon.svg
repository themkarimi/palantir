<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none" aria-label="Palantir icon">
  <defs>
    <radialGradient id="orb-bg" cx="42%" cy="38%" r="55%">
      <stop offset="0%"  stop-color="#00e5ff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#0d0f14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="core-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="22" cy="22" r="21" fill="url(#orb-bg)" stroke="#00e5ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Middle ring -->
  <circle cx="22" cy="22" r="14" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.55"/>
  <!-- Inner ring -->
  <circle cx="22" cy="22" r="7"  fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.75"/>
  <!-- Core -->
  <circle cx="22" cy="22" r="3"  fill="#00e5ff" filter="url(#core-glow)"/>
  <!-- Highlight -->
  <circle cx="16.5" cy="16.5" r="1.8" fill="#ffffff" fill-opacity="0.28"/>
</svg>
