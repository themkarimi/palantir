<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none" aria-label="Palantir">
  <!-- Icon: orb / seeing-stone -->
  <defs>
    <radialGradient id="orb-fill" cx="42%" cy="38%" r="55%" fx="42%" fy="38%">
      <stop offset="0%"  stop-color="#00e5ff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#0d0f14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-sm" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="22" cy="22" r="20" fill="url(#orb-fill)" stroke="#00e5ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Middle ring -->
  <circle cx="22" cy="22" r="13" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="22" cy="22" r="7"  fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.7"/>
  <!-- Core dot with glow -->
  <circle cx="22" cy="22" r="2.5" fill="#00e5ff" filter="url(#glow-sm)"/>
  <!-- Highlight glint -->
  <circle cx="17" cy="17" r="1.5" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Wordmark -->
  <text
    x="52"
    y="28.5"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="18"
    font-weight="600"
    letter-spacing="1.5"
    fill="#ffffff"
  >PALANTIR</text>
</svg>
