{{- if not .Values.existingSecret -}}
{{- $fullname := include "palantir.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $fullname }}
{{- $jwtSecret := .Values.env.jwtSecret }}
{{- if not $jwtSecret }}
  {{- if and $existing $existing.data (index $existing.data "JWT_SECRET") }}
    {{- $jwtSecret = index $existing.data "JWT_SECRET" | b64dec }}
  {{- else }}
    {{- $jwtSecret = randAlphaNum 64 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "palantir.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_PASSWORD: {{ .Values.env.adminPassword | quote }}
  JWT_SECRET: {{ $jwtSecret | quote }}
  {{- if .Values.env.oidc.clientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.env.oidc.clientSecret | quote }}
  {{- end }}
{{- end }}
