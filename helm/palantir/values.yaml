# Default values for palantir.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/themkarimi/palantir
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1001

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: palantir.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: palantir-tls
  #    hosts:
  #      - palantir.example.com

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Persistent storage for the apps.json data file
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # existingClaim: ""

# Application environment configuration
env:
  # Admin credentials
  adminEmail: "admin@example.com"
  # Admin password — override in production; stored in the Secret
  adminPassword: "changeme"
  # JWT secret — must be at least 32 characters; stored in the Secret.
  # Generate with: openssl rand -base64 32
  # IMPORTANT: If left empty, a random secret is generated on each Helm upgrade,
  # which will invalidate all active user sessions. Set a stable value for production.
  jwtSecret: ""
  # Path to the apps data file inside the container
  dataFilePath: "/app/data/apps.json"

  # OIDC / SSO Authentication (optional)
  # When all four oidc.* values are set, a "Sign in with SSO" button appears.
  oidc:
    issuer: ""
    clientId: ""
    clientSecret: ""
    redirectUri: ""
    adminGroup: ""
    scopes: "openid profile email groups"

# Use an existing Secret for sensitive values instead of creating one.
# The secret must contain: ADMIN_PASSWORD, JWT_SECRET
# If oidc is configured, it must also contain: OIDC_CLIENT_SECRET
existingSecret: ""

nodeSelector: {}

tolerations: []

affinity: {}
